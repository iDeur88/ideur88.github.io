<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>档案馆 · 包装材料图像库</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#FFFFFF; --bg2:#F7F7F5; --bg3:#EFEFED; --card:#FFFFFF;
  --ink:#111111; --ink2:#333333; --muted:#888888;
  --border:#E0E0E0; --border2:#CCCCCC;
  --teal:#72979f; --gold:#d1a96b;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'Noto Sans SC',sans-serif;overflow-x:hidden;min-height:100vh}

/* ══ 导航 ══ */
#top-nav{
  position:fixed;top:0;left:0;right:0;z-index:300;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 clamp(16px,4vw,48px);
  background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.nav-logo{font-size:15px;font-weight:700;color:var(--ink);text-decoration:none;user-select:none;cursor:pointer}
.nav-logo em{color:var(--teal);font-style:normal}
.nav-back{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none;transition:color 0.2s}
.nav-back:hover{color:var(--gold)}
#adminBar{display:none;align-items:center;gap:8px}
.nav-btn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.06em;
  padding:6px 14px;border-radius:16px;cursor:pointer;transition:all 0.2s;
  border:1px solid var(--border2);background:transparent;color:var(--ink2)}
.nav-btn:hover{border-color:var(--teal);color:var(--teal)}
.nav-btn.gold{background:var(--gold);border-color:var(--gold);color:#fff}
.nav-btn.gold:hover{opacity:0.85}
.nav-btn.exit{border-color:#ccc;color:var(--muted)}
.nav-btn.exit:hover{border-color:#ef4444;color:#ef4444}

/* 管理员标记 */
.admin-chip{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;
  padding:3px 10px;border-radius:10px;background:var(--gold);color:#fff;
}

/* ══ Header ══ */
.page-header{
  margin-top:56px;padding:36px clamp(16px,4vw,48px) 24px;
  background:linear-gradient(135deg,#F5F4F1 0%,#FFFFFF 60%,#F2F0EB 100%);
  border-bottom:1px solid var(--border);
}
.page-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.22em;
  text-transform:uppercase;color:var(--teal);margin-bottom:8px}
.page-title{font-size:26px;font-weight:600;color:var(--ink);margin-bottom:20px;letter-spacing:-0.01em}

/* 模式切换 + 搜索栏 */
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.mode-switch{display:flex;border:1px solid var(--border2);border-radius:20px;overflow:hidden;flex-shrink:0}
.mode-btn{
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.06em;
  padding:6px 16px;border:none;cursor:pointer;transition:all 0.2s;
  background:transparent;color:var(--muted);
}
.mode-btn.active{background:var(--ink);color:#fff}
.search-input{
  font-family:'DM Mono',monospace;font-size:12px;
  padding:7px 16px;border-radius:20px;
  border:1px solid var(--border2);background:var(--card);
  color:var(--ink);outline:none;width:220px;transition:border-color 0.2s;
}
.search-input:focus{border-color:var(--teal)}
.search-input::placeholder{color:var(--muted)}
.filter-tags{display:flex;gap:6px;flex-wrap:wrap}
.ftag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.06em;
  padding:4px 12px;border-radius:14px;cursor:pointer;transition:all 0.2s;
  border:1px solid var(--border2);background:transparent;color:var(--ink2)}
.ftag:hover,.ftag.active{background:var(--teal);border-color:var(--teal);color:#fff}
.item-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap}

/* ══ 主体 ══ */
#main-wrap{padding:32px clamp(16px,4vw,48px) 80px;min-height:60vh}

/* ══ 瀑布流模式 ══ */
.masonry{
  columns:4;column-gap:12px;
}
@media(max-width:1100px){.masonry{columns:3}}
@media(max-width:700px){.masonry{columns:2}}
@media(max-width:400px){.masonry{columns:1}}

.mcard{
  break-inside:avoid;margin-bottom:12px;
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;cursor:pointer;
  transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;
  display:block;
}
.mcard:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,0.09);border-color:var(--border2)}
.mcard-img{
  width:100%;display:block;min-height:80px;
  background:var(--bg3);transition:transform 0.3s;
}
.mcard:hover .mcard-img{transform:scale(1.03)}
.mcard-body{padding:10px 12px 12px}
.mcard-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.mctag{font-family:'DM Mono',monospace;font-size:9px;padding:1px 7px;border-radius:6px;background:var(--bg3);color:var(--teal)}
.mcard-note{font-size:12px;font-weight:500;color:var(--ink);line-height:1.5;margin-bottom:4px}
.mcard-source{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mcard-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.mcard-date{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)}
/* 管理员操作按钮 */
.mcard-ops{display:none;gap:4px}
body.is-admin .mcard-ops{display:flex}
.op-btn{font-family:'DM Mono',monospace;font-size:9px;padding:2px 8px;border-radius:6px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all 0.15s}
.op-btn:hover{border-color:var(--teal);color:var(--teal)}
.op-btn.del:hover{border-color:#ef4444;color:#ef4444}

/* ══ 相册模式 ══ */
.album-section{margin-bottom:56px}
.album-header{display:flex;align-items:baseline;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.album-name{font-size:20px;font-weight:500;color:var(--ink);letter-spacing:-0.01em}
.album-count{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted)}
.album-admin-actions{margin-left:auto;display:none;gap:6px}
body.is-admin .album-admin-actions{display:flex}
.album-btn{font-family:'DM Mono',monospace;font-size:9px;padding:3px 10px;border-radius:8px;cursor:pointer;transition:all 0.15s;border:1px solid var(--border2);background:transparent;color:var(--muted)}
.album-btn:hover{border-color:var(--teal);color:var(--teal)}
.album-btn.danger:hover{border-color:#ef4444;color:#ef4444}

/* 相册内图片网格：横向等高行 */
.album-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:1000px){.album-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:650px){.album-grid{grid-template-columns:repeat(2,1fr)}}

.agcard{
  position:relative;border-radius:10px;overflow:hidden;
  background:var(--bg3);cursor:pointer;aspect-ratio:1/1;
  transition:transform 0.2s,box-shadow 0.2s;
}
.agcard:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,0.1)}
.agcard-img{width:100%;height:100%;object-fit:cover;transition:transform 0.3s;display:block}
.agcard:hover .agcard-img{transform:scale(1.05)}
.agcard-overlay{
  position:absolute;inset:0;
  background:linear-gradient(transparent 50%,rgba(17,17,17,0.75) 100%);
  padding:10px;display:flex;flex-direction:column;justify-content:flex-end;
  opacity:0;transition:opacity 0.2s;
}
.agcard:hover .agcard-overlay{opacity:1}
.agcard-note{font-size:11px;font-weight:500;color:#fff;line-height:1.4}
/* 管理员操作层 */
.agcard-ops{position:absolute;top:6px;right:6px;display:none;gap:4px}
body.is-admin .agcard-ops{display:flex}
.ag-op{width:24px;height:24px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:11px;
  background:rgba(255,255,255,0.9);color:var(--ink2);transition:all 0.15s}
.ag-op:hover{transform:scale(1.1)}
.ag-op.del:hover{background:#fee2e2;color:#ef4444}

/* 添加图片虚拟格 */
.add-card{
  aspect-ratio:1/1;border-radius:10px;
  border:1px dashed var(--border2);background:transparent;
  display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:6px;cursor:pointer;transition:all 0.2s;
  color:var(--muted);
}
body.is-admin .add-card{display:flex}
.add-card:hover{border-color:var(--teal);color:var(--teal);background:var(--bg3)}
.add-card-icon{font-size:24px;opacity:0.5}
.add-card-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.06em}

/* ══ 空状态 ══ */
.empty-wrap{text-align:center;padding:80px 20px;color:var(--muted);font-family:'DM Mono',monospace}
.empty-icon{font-size:40px;margin-bottom:14px;opacity:0.4}
.empty-title{font-size:13px;letter-spacing:0.06em;margin-bottom:6px;color:var(--ink2)}
.empty-sub{font-size:11px;line-height:1.8}

/* 加载 */
.loading-wrap{text-align:center;padding:80px 20px;font-family:'DM Mono',monospace;color:var(--muted);font-size:12px}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══ 灯箱 ══ */
#lightbox{display:none;position:fixed;inset:0;z-index:1000;background:rgba(10,10,10,0.94);align-items:center;justify-content:center;backdrop-filter:blur(10px)}
#lightbox.open{display:flex}
.lb-inner{position:relative;max-width:90vw;max-height:90vh;display:flex;flex-direction:column;align-items:center}
#lb-img{max-width:88vw;max-height:76vh;border-radius:8px;object-fit:contain;box-shadow:0 20px 60px rgba(0,0,0,0.6)}
.lb-bar{background:rgba(255,255,255,0.93);backdrop-filter:blur(16px);border-radius:0 0 8px 8px;padding:12px 18px;width:100%;max-width:88vw}
.lb-note{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:3px}
.lb-src{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.lb-src a{color:var(--teal);text-decoration:none}
.lb-close{position:absolute;top:-42px;right:0;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.lb-close:hover{background:rgba(255,255,255,0.25)}

/* ══ 通用面板 ══ */
.panel-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(10,10,10,0.55);backdrop-filter:blur(6px);align-items:center;justify-content:center}
.panel-overlay.open{display:flex}
.panel-box{background:var(--card);border:1px solid var(--border2);border-radius:18px;padding:28px;width:100%;max-width:460px;box-shadow:0 20px 56px rgba(0,0,0,0.15)}
.panel-title{font-size:17px;font-weight:600;color:var(--ink);margin-bottom:18px;letter-spacing:-0.01em}
.panel-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.06em;margin-bottom:6px}
.panel-input{width:100%;font-family:'DM Mono',monospace;font-size:12px;padding:9px 14px;border-radius:10px;border:1px solid var(--border2);background:var(--bg2);color:var(--ink);outline:none;margin-bottom:14px;transition:border-color 0.2s}
.panel-input:focus{border-color:var(--teal)}
.panel-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.btn-cancel{font-family:'DM Mono',monospace;font-size:11px;padding:8px 18px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s}
.btn-cancel:hover{border-color:var(--border2);color:var(--ink)}
.btn-ok{font-family:'DM Mono',monospace;font-size:11px;padding:8px 18px;border-radius:10px;border:none;background:var(--teal);color:#fff;cursor:pointer;transition:opacity 0.2s}
.btn-ok:hover{opacity:0.85}
.panel-msg{font-family:'DM Mono',monospace;font-size:10px;padding:6px 10px;border-radius:8px;margin-bottom:12px;display:none}
.panel-msg.ok{display:block;background:#d1fae5;color:#065f46}
.panel-msg.err{display:block;background:#fee2e2;color:#991b1b}

/* ══ Toast ══ */
#toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-family:'DM Mono',monospace;font-size:12px;padding:10px 24px;border-radius:20px;opacity:0;transition:all 0.3s;z-index:2000;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--teal);color:#fff}
#toast.err{background:#ef4444}

/* ══ Footer ══ */
footer{border-top:1px solid var(--border);padding:20px clamp(16px,4vw,48px);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);background:var(--bg2)}
footer a{color:var(--teal);text-decoration:none}
</style>
</head>
<body>

<nav id="top-nav">
  <a class="nav-back" href="index.html">← 返回主页</a>
  <span class="nav-logo" id="navLogo">档案馆<em> · Archive</em></span>
  <div id="adminBar">
    <span class="admin-chip">管理员</span>
    <button class="nav-btn" id="btnToken">Token</button>
    <button class="nav-btn" id="btnNewAlbum">+ 相册</button>
    <button class="nav-btn gold" id="btnAddPhoto">+ 添加图片</button>
    <button class="nav-btn exit" id="btnExitAdmin">退出</button>
  </div>
</nav>

<div class="page-header">
  <div class="page-eyebrow">Packaging Archive · 图像档案馆</div>
  <div class="page-title">包装材料图像库</div>
  <div class="toolbar">
    <div class="mode-switch">
      <button class="mode-btn active" id="btnModeWaterfall" onclick="setMode('waterfall')">瀑布流</button>
      <button class="mode-btn" id="btnModeAlbum" onclick="setMode('album')">相册</button>
    </div>
    <input class="search-input" type="text" id="searchInput" placeholder="搜索关键词、标签…" oninput="render()">
    <div class="filter-tags">
      <button class="ftag active" data-tag="all" onclick="setTag('all',this)">全部</button>
      <button class="ftag" data-tag="纸质" onclick="setTag('纸质',this)">纸质</button>
      <button class="ftag" data-tag="塑料" onclick="setTag('塑料',this)">塑料</button>
      <button class="ftag" data-tag="金属" onclick="setTag('金属',this)">金属</button>
      <button class="ftag" data-tag="玻璃" onclick="setTag('玻璃',this)">玻璃</button>
      <button class="ftag" data-tag="复合" onclick="setTag('复合',this)">复合</button>
      <button class="ftag" data-tag="印刷" onclick="setTag('印刷',this)">印刷</button>
      <button class="ftag" data-tag="绿色" onclick="setTag('绿色',this)">绿色</button>
    </div>
    <span class="item-count" id="itemCount"></span>
  </div>
</div>

<div id="main-wrap">
  <div class="loading-wrap" id="loadingWrap"><div class="spinner"></div>正在加载…</div>
  <div id="content" style="display:none"></div>
</div>

<!-- 灯箱 -->
<div id="lightbox" onclick="if(event.target===this)closeLb()">
  <div class="lb-inner">
    <button class="lb-close" onclick="closeLb()">✕</button>
    <img id="lb-img" src="" alt="">
    <div class="lb-bar">
      <div class="lb-note" id="lb-note"></div>
      <div class="lb-src" id="lb-src"></div>
    </div>
  </div>
</div>

<!-- Token 面板 -->
<div class="panel-overlay" id="tokenPanel" onclick="if(event.target===this)closePanel('tokenPanel')">
  <div class="panel-box">
    <div class="panel-title">GitHub Token</div>
    <div class="panel-msg" id="tokenMsg"></div>
    <div class="panel-label">Personal Access Token（repo 权限）</div>
    <input class="panel-input" type="password" id="tokenInput" placeholder="ghp_…">
    <div class="panel-footer">
      <button class="btn-cancel" onclick="closePanel('tokenPanel')">取消</button>
      <button class="btn-ok" onclick="saveToken()">保存并验证</button>
    </div>
  </div>
</div>

<!-- 新建相册面板 -->
<div class="panel-overlay" id="albumPanel" onclick="if(event.target===this)closePanel('albumPanel')">
  <div class="panel-box">
    <div class="panel-title">新建相册</div>
    <div class="panel-label">相册名称</div>
    <input class="panel-input" type="text" id="albumNameInput" placeholder="例：瓦楞纸箱 / 高端礼品盒…">
    <div class="panel-footer">
      <button class="btn-cancel" onclick="closePanel('albumPanel')">取消</button>
      <button class="btn-ok" onclick="createAlbum()">创建</button>
    </div>
  </div>
</div>

<!-- 添加图片面板 -->
<div class="panel-overlay" id="addPanel" onclick="if(event.target===this)closePanel('addPanel')">
  <div class="panel-box">
    <div class="panel-title">添加图片</div>
    <div class="panel-label">图片 URL *</div>
    <input class="panel-input" type="url" id="add-url" placeholder="https://…">
    <div class="panel-label">来源页面</div>
    <input class="panel-input" type="url" id="add-src" placeholder="https://…">
    <div class="panel-label">备注说明</div>
    <input class="panel-input" type="text" id="add-note" placeholder="简短描述…">
    <div class="panel-label">标签（逗号分隔）</div>
    <input class="panel-input" type="text" id="add-tags" placeholder="纸质, 包装设计…">
    <div class="panel-label">所属相册</div>
    <select class="panel-input" id="add-album-sel" style="cursor:pointer"></select>
    <div class="panel-footer">
      <button class="btn-cancel" onclick="closePanel('addPanel')">取消</button>
      <button class="btn-ok" onclick="submitAdd()">添加</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<footer>
  <span>数据存储于 <a href="https://github.com/ideur88/ideur88.github.io/blob/main/archive.json" target="_blank">archive.json</a></span>
  <span id="footerCount"></span>
</footer>

<script>
const PROXY    = 'https://img-proxy.ideallutteur.workers.dev';
const REPO     = 'ideur88/ideur88.github.io';
const API      = `https://api.github.com/repos/${REPO}/contents/archive.json`;

/* ── 状态 ── */
let db       = { albums:[], items:[] };  // 全局数据
let fileSHA  = '';
let mode     = 'waterfall';   // 'waterfall' | 'album'
let activeTag = 'all';
let isAdmin  = false;
let adminToken = '';           // Token 仅在本次会话有效

/* ── 工具 ── */
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function cleanText(s){
  if(!s) return '';
  // 过滤 U+0080-U+00FF：扩展Latin区，是UTF-8被latin-1误读的乱码来源
  let t = s.replace(/[\u0080-\u00FF]/g, '');
  // 过滤Unicode替换字符、控制字符、弯引号等误读产物
  t = t.replace(/[\uFFFD\u2018-\u201F\u2032-\u2036\u0000-\u0008\u000B\u000C\u000E-\u001F\u007F]/g, '');
  // 清理多余空格和开头标点
  t = t.replace(/^[^\w\u4E00-\u9FFF]+/, '').replace(/\s+/g, ' ').trim();
  // 有效字符（中英文+常用标点）占比检查
  if(t.length > 2){
    const valid = (t.match(/[\u4E00-\u9FFF\u3000-\u303F\uFF00-\uFFEF\x20-\x7E]/g)||[]).length;
    if(valid / t.replace(/\s/g,'').length < 0.3) return '';
  }
  return t;
}
function proxyUrl(url){ return url ? PROXY+'?url='+encodeURIComponent(url) : ''; }
function imgHtml(url,alt=''){
  const p = proxyUrl(url);
  return `<img class="mcard-img" src="${esc(p)}" alt="${esc(alt)}" loading="lazy" onerror="this.src='${esc(url)}';this.onerror=null">`;
}
function agImgHtml(url,alt=''){
  const p = proxyUrl(url);
  return `<img class="agcard-img" src="${esc(p)}" alt="${esc(alt)}" loading="lazy" onerror="this.src='${esc(url)}';this.onerror=null">`;
}

let toastT;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='show'+(type?' '+type:'');
  clearTimeout(toastT); toastT=setTimeout(()=>el.className='',2800);
}

/* ── 加载 ── */
async function load(){
  try{
    const res = await fetch(API+'?t='+Date.now());
    if(!res.ok) throw new Error(res.status);
    const d = await res.json();
    fileSHA = d.sha;
    const raw = JSON.parse(atob(d.content.replace(/\n/g,'')));
    if(Array.isArray(raw)){
      db = { albums:[{id:'default',name:'全部收藏',order:0}], items:raw.map(i=>({...i,albumId:'default'})) };
    } else {
      db = { albums:raw.albums||[], items:raw.items||[] };
      if(!db.albums.length) db.albums=[{id:'default',name:'全部收藏',order:0}];
    }
    // 全局清洗所有乱码
    db.albums.forEach(a => { a.name = cleanText(a.name) || a.name || '未命名相册'; });
    db.items.forEach(i => {
      i.note = cleanText(i.note) || '';
      i.tags = (i.tags||[]).map(t => cleanText(t)||t).filter(Boolean);
    });
    localStorage.setItem('archive_cache', JSON.stringify(db));
  }catch(e){
    const c=localStorage.getItem('archive_cache');
    if(c) try{db=JSON.parse(c);}catch{}
    toast('加载失败，使用缓存','err');
  }
  document.getElementById('loadingWrap').style.display='none';
  document.getElementById('content').style.display='block';
  render();
}

/* ── 保存 ── */
async function save(){
  const token = adminToken || localStorage.getItem('gh_token') || '';
  if(!token){ openPanel('tokenPanel'); toast('请先设置 Token','err'); return false; }
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(db,null,2))));
  const res = await fetch(API,{
    method:'PUT',
    headers:{'Authorization':'token '+token,'Content-Type':'application/json'},
    body:JSON.stringify({message:'archive: update',content,sha:fileSHA})
  });
  if(res.ok){
    const d=await res.json(); fileSHA=d.content.sha;
    localStorage.setItem('archive_cache',JSON.stringify(db));
    return true;
  }
  const err=await res.json().catch(()=>({}));
  toast('保存失败：'+(err.message||res.status),'err');
  return false;
}

/* ── 渲染 ── */
function render(){
  const kw=(document.getElementById('searchInput').value||'').toLowerCase();
  const filtered=db.items.filter(item=>{
    const matchTag=activeTag==='all'||(item.tags||[]).includes(activeTag);
    const matchKw=!kw||cleanText(item.note).toLowerCase().includes(kw)||(item.tags||[]).some(t=>t.toLowerCase().includes(kw))||(item.source||'').toLowerCase().includes(kw);
    return matchTag&&matchKw;
  });
  document.getElementById('itemCount').textContent=filtered.length+' 条';
  document.getElementById('footerCount').textContent=db.items.length+' 条记录';
  if(mode==='waterfall') renderWaterfall(filtered);
  else renderAlbum(filtered);
}

function renderWaterfall(items){
  const content=document.getElementById('content');
  if(!items.length){
    content.innerHTML=`<div class="empty-wrap"><div class="empty-icon">📦</div><div class="empty-title">${db.items.length?'没有符合条件的图片':'档案馆还是空的'}</div><div class="empty-sub">激活管理员模式后可添加图片</div></div>`;
    return;
  }
  const sorted=[...items].sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
  content.innerHTML=`<div class="masonry">${sorted.map(item=>makeMCard(item)).join('')}</div>`;
  bindMCardClicks();
}

function makeMCard(item){
  const note=cleanText(item.note);
  const tags=(item.tags||[]).map(t=>cleanText(t)||t).filter(Boolean).map(t=>`<span class="mctag">${esc(t)}</span>`).join('');
  const date=item.date?new Date(item.date).toLocaleDateString('zh-CN'):'';
  let srcHost=''; try{srcHost=new URL(item.source||'').hostname;}catch{}
  const displayNote = note || srcHost; // 乱码清空后用 hostname 兜底
  return `<div class="mcard" data-id="${esc(item.id||'')}">
    ${imgHtml(item.url,displayNote)}
    <div class="mcard-body">
      ${tags?`<div class="mcard-tags">${tags}</div>`:''}
      ${displayNote&&displayNote!==srcHost?`<div class="mcard-note">${esc(displayNote)}</div>`:''}
      ${srcHost?`<div class="mcard-source">${esc(srcHost)}</div>`:''}
      <div class="mcard-meta">
        <span class="mcard-date">${date}</span>
        <div class="mcard-ops">
          <button class="op-btn" onclick="editTags(event,'${esc(item.id||'')}')">🏷</button>
          <button class="op-btn del" onclick="deleteItem(event,'${esc(item.id||'')}')">✕</button>
        </div>
      </div>
    </div>
  </div>`;
}

function bindMCardClicks(){
  document.querySelectorAll('.mcard').forEach(card=>{
    card.addEventListener('click',()=>{
      const id=card.dataset.id;
      const item=db.items.find(i=>i.id===id);
      if(item) openLb(item);
    });
  });
}

function renderAlbum(filtered){
  const content=document.getElementById('content');
  content.innerHTML='';
  const sorted=[...db.albums].sort((a,b)=>(a.order||0)-(b.order||0));
  sorted.forEach(album=>{
    const albumItems=filtered.filter(i=>i.albumId===album.id).sort((a,b)=>new Date(b.date||0)-new Date(a.date||0));
    const total=db.items.filter(i=>i.albumId===album.id).length;
    const sec=document.createElement('div');
    sec.className='album-section';
    sec.innerHTML=`
      <div class="album-header">
        <span class="album-name">${esc(cleanText(album.name)||album.name||'未命名相册')}</span>
        <span class="album-count">(${total})</span>
        <div class="album-admin-actions">
          <button class="album-btn" onclick="renameAlbum('${esc(album.id)}')">重命名</button>
          <button class="album-btn danger" onclick="deleteAlbum('${esc(album.id)}')">删除</button>
        </div>
      </div>
      <div class="album-grid" id="ag-${esc(album.id)}"></div>`;
    content.appendChild(sec);
    const grid=sec.querySelector('.album-grid');
    albumItems.forEach(item=>{ grid.appendChild(makeAgCard(item)); });
    if(isAdmin){
      const addCard=document.createElement('div');
      addCard.className='add-card';
      addCard.innerHTML=`<div class="add-card-icon">＋</div><div class="add-card-label">添加图片</div>`;
      addCard.onclick=()=>openAddPhoto(album.id);
      grid.appendChild(addCard);
    }
  });
  // 未分类
  const orphans=filtered.filter(i=>!db.albums.find(a=>a.id===i.albumId));
  if(orphans.length){
    const sec=document.createElement('div');
    sec.className='album-section';
    sec.innerHTML=`<div class="album-header"><span class="album-name">未分类</span><span class="album-count">(${orphans.length})</span></div><div class="album-grid" id="ag-orphan"></div>`;
    content.appendChild(sec);
    const grid=sec.querySelector('.album-grid');
    orphans.forEach(item=>grid.appendChild(makeAgCard(item)));
  }
  if(!content.children.length){
    content.innerHTML=`<div class="empty-wrap"><div class="empty-icon">📂</div><div class="empty-title">没有相册</div><div class="empty-sub">激活管理员模式，点击「+ 相册」新建</div></div>`;
  }
}

function makeAgCard(item){
  const note=cleanText(item.note);
  const div=document.createElement('div');
  div.className='agcard';
  div.innerHTML=`
    ${agImgHtml(item.url,note)}
    <div class="agcard-overlay">${note?`<div class="agcard-note">${esc(note)}</div>`:''}</div>
    <div class="agcard-ops">
      <button class="ag-op" title="编辑标签" onclick="event.stopPropagation();editTags(event,'${esc(item.id||'')}')">🏷</button>
      <button class="ag-op del" title="删除" onclick="event.stopPropagation();deleteItem(event,'${esc(item.id||'')}')">✕</button>
    </div>`;
  div.addEventListener('click',()=>openLb(item));
  return div;
}

/* ── 模式/筛选 ── */
function setMode(m){
  mode=m;
  document.getElementById('btnModeWaterfall').classList.toggle('active',m==='waterfall');
  document.getElementById('btnModeAlbum').classList.toggle('active',m==='album');
  render();
}
function setTag(tag,btn){
  activeTag=tag;
  document.querySelectorAll('.ftag').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

/* ── 灯箱 ── */
function openLb(item){
  const note=cleanText(item.note);
  document.getElementById('lb-img').src=proxyUrl(item.url)||item.url;
  document.getElementById('lb-img').onerror=function(){this.src=item.url;this.onerror=null};
  document.getElementById('lb-note').textContent=note;
  document.getElementById('lb-src').innerHTML=item.source?`来源：<a href="${esc(item.source)}" target="_blank" rel="noopener">${esc(item.source)}</a>`:'';
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLb(){
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lb-img').src='';
  document.body.style.overflow='';
}

/* ── 面板 ── */
function openPanel(id){ document.getElementById(id).classList.add('open'); }
function closePanel(id){ document.getElementById(id).classList.remove('open'); }

/* ── Token ── */
document.getElementById('btnToken').onclick=()=>{
  document.getElementById('tokenInput').value=adminToken||localStorage.getItem('gh_token')||'';
  document.getElementById('tokenMsg').className='panel-msg';
  openPanel('tokenPanel');
};
async function saveToken(){
  const t=document.getElementById('tokenInput').value.trim();
  if(!t){toast('请输入 Token','err');return;}
  const msg=document.getElementById('tokenMsg');
  msg.className='panel-msg'; msg.textContent='验证中…'; msg.style.display='block';
  try{
    const res=await fetch(`https://api.github.com/repos/${REPO}`,{headers:{'Authorization':'token '+t}});
    if(res.ok){
      adminToken=t; localStorage.setItem('gh_token',t);
      msg.className='panel-msg ok'; msg.textContent='✓ 验证成功';
      toast('Token 已保存','ok');
      setTimeout(()=>closePanel('tokenPanel'),1000);
    } else {
      msg.className='panel-msg err'; msg.textContent='✗ Token 无效或无权限';
    }
  }catch{ msg.className='panel-msg err'; msg.textContent='✗ 网络错误'; }
}

/* ── 新建相册 ── */
document.getElementById('btnNewAlbum').onclick=()=>{
  document.getElementById('albumNameInput').value='';
  openPanel('albumPanel');
};
async function createAlbum(){
  const name=document.getElementById('albumNameInput').value.trim();
  if(!name){toast('相册名不能为空','err');return;}
  const album={id:'alb_'+Date.now().toString(36),name,order:db.albums.length};
  db.albums.push(album);
  const ok=await save();
  if(ok){render();closePanel('albumPanel');toast('相册已创建','ok');}
  else db.albums.pop();
}

/* ── 添加图片 ── */
function openAddPhoto(albumId){
  ['add-url','add-src','add-note','add-tags'].forEach(id=>document.getElementById(id).value='');
  const sel=document.getElementById('add-album-sel');
  sel.innerHTML=db.albums.map(a=>`<option value="${esc(a.id)}"${a.id===albumId?' selected':''}>${esc(a.name)}</option>`).join('');
  openPanel('addPanel');
}
document.getElementById('btnAddPhoto').onclick=()=>openAddPhoto('');
async function submitAdd(){
  const url=document.getElementById('add-url').value.trim();
  if(!url){toast('图片 URL 不能为空','err');return;}
  const item={
    id:Date.now().toString(36)+Math.random().toString(36).slice(2,5),
    url, source:document.getElementById('add-src').value.trim(),
    note:document.getElementById('add-note').value.trim(),
    tags:document.getElementById('add-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    albumId:document.getElementById('add-album-sel').value,
    date:new Date().toISOString()
  };
  db.items=[item,...db.items];
  const ok=await save();
  if(ok){render();closePanel('addPanel');toast('已添加','ok');}
  else db.items=db.items.filter(i=>i.id!==item.id);
}

/* ── 删除图片 ── */
async function deleteItem(e,id){
  e.stopPropagation();
  if(!confirm('确定删除这张图片？'))return;
  const prev=db.items;
  db.items=db.items.filter(i=>i.id!==id);
  const ok=await save();
  if(ok){render();toast('已删除','ok');}
  else{db.items=prev;toast('删除失败','err');}
}

/* ── 编辑标签 ── */
async function editTags(e,id){
  e.stopPropagation();
  const item=db.items.find(i=>i.id===id);
  if(!item)return;
  const cur=(item.tags||[]).join(', ');
  const input=prompt(`编辑标签（逗号分隔）：`,cur);
  if(input===null)return;
  item.tags=input.split(',').map(t=>t.trim()).filter(Boolean);
  const ok=await save();
  if(ok){render();toast('标签已更新','ok');}
}

/* ── 重命名/删除相册 ── */
async function renameAlbum(id){
  const album=db.albums.find(a=>a.id===id);
  if(!album)return;
  const name=prompt('新相册名：',album.name);
  if(!name||name.trim()===album.name)return;
  const old=album.name; album.name=name.trim();
  const ok=await save();
  if(ok){render();toast('已重命名','ok');}
  else{album.name=old;toast('失败','err');}
}
async function deleteAlbum(id){
  const album=db.albums.find(a=>a.id===id);
  if(!album)return;
  const count=db.items.filter(i=>i.albumId===id).length;
  if(!confirm(`删除相册「${album.name}」？${count?`\n${count} 张图片将移至未分类。`:''}`))return;
  db.albums=db.albums.filter(a=>a.id!==id);
  db.items.forEach(i=>{if(i.albumId===id)i.albumId='';});
  const ok=await save();
  if(ok){render();toast('相册已删除','ok');}
}

/* ── 管理员模式：Logo 点5次 ── */
let clicks=0,clickT;
document.getElementById('navLogo').addEventListener('click',e=>{
  e.preventDefault();
  clicks++; clearTimeout(clickT);
  clickT=setTimeout(()=>clicks=0,2000);
  if(clicks>=5){
    clicks=0; isAdmin=!isAdmin;
    document.body.classList.toggle('is-admin',isAdmin);
    document.getElementById('adminBar').style.display=isAdmin?'flex':'none';
    toast(isAdmin?'管理员模式已激活':'已退出管理员模式',isAdmin?'ok':'');
    if(isAdmin&&!adminToken){
      const saved=localStorage.getItem('gh_token');
      if(saved) adminToken=saved;
      else{ toast('请设置 GitHub Token','err'); openPanel('tokenPanel'); }
    }
    render();
  }
});

document.getElementById('btnExitAdmin').onclick=()=>{
  isAdmin=false;
  document.body.classList.remove('is-admin');
  document.getElementById('adminBar').style.display='none';
  toast('已退出管理员模式');
  render();
};

/* ESC */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeLb();
    ['tokenPanel','albumPanel','addPanel'].forEach(closePanel);
  }
});

load();
</script>
